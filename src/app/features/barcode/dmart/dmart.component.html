<app-navbar class="no-print"></app-navbar>

<div class="container">
  <div class="header no-print">
    <h1>D-Mart Barcode Generator</h1>
  </div>

  <div class="barcode-top-options no-print">
    <div class="packed-date-wrapper">
      <label for="packedOn" class="packed-date-label">📦 <strong>Packed On Date</strong></label>
      <input type="date" id="packedOn" name="packedOn" class="form-control packed-date-input" [(ngModel)]="packedOnDate"
        (change)="onPackedOnChange()" />
    </div>
  </div>

  <form>
    <table class="table">
      <thead>
        <tr>
          <th class="col-product">Product</th>
          <th class="col-small">Qty</th>
          <th class="col-small">M.R.P. (₹)</th>
          <th>Category</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of products; let i = index; trackBy: trackByIndex">
          <td class="product-cell">
            <mat-form-field appearance="outline" class="product-field">
              <input matInput type="text" name="productSearch{{ i }}" [(ngModel)]="item.searchText"
                [matAutocomplete]="auto" (input)="filterProducts(i)" (blur)="tryAutoSelectClosest(i)"
                placeholder="Type product like Cabb 500" />

              <mat-autocomplete #auto="matAutocomplete">
                <mat-option *ngFor="let option of item.filteredOptions" [value]="displayName(option)"
                  (onSelectionChange)="onOptionChosen(i, option, $event)">
                  {{ option.name }} {{ option.units }}
                </mat-option>
              </mat-autocomplete>
            </mat-form-field>
          </td>

          <td>
            <input type="number" class="form-control" [(ngModel)]="item.quantity" name="quantity{{ i }}" />
          </td>

          <td>
            <input type="number" class="form-control" [(ngModel)]="item.mrp" name="mrp{{ i }}" (change)="onMrpChange(i)"
              (keydown)="onMrpKeyDown($event, i)" />
          </td>

          <td>
            <select class="form-control" [(ngModel)]="item.category" name="category{{ i }}"
              (change)="generateBarcode(item)" [tabindex]="-1">
              <option value="">Select</option>
              <option value="Fruit">Fruit</option>
              <option value="Vegetable">Vegetable</option>
            </select>
          </td>

          <td class="no-print">
            <button type="button" class="btn btn-outline-danger delete-btn" (click)="removeRow(i)" [tabindex]="-1">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="actions no-print">
      <button type="button" class="btn btn-outline-primary add-btn" (click)="addRow()">Add Row</button>
      <button type="button" class="btn btn-warning" (click)="resetForm()">Refresh</button>
      <button type="button" class="btn btn-primary" (click)="printSelected()">Print</button>
      <button type="button" class="btn-back" (click)="testPreview()">Preview</button>
      <button type="button" class="btn print-all-test-btn" (click)="printAllBarcodesTest()">Print ALL (Test)</button>
      <button type="button" class="btn btn-success view-history-btn" (click)="goToHistory()">View History</button>
    </div>
  </form>
</div>
